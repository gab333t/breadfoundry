<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BREAD FOUNDRY</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
</head>
<body>
    <p id="header-text">BREAD FOUNDRY</p>
    <div id="bread-label"></div>
    <div id="models-container">
        <div class="model-canvas-wrapper" id="container-0"></div>
        <div class="model-canvas-wrapper" id="container-1"></div>
        <div class="model-canvas-wrapper" id="container-2"></div>
        <div class="model-canvas-wrapper" id="container-3"></div>
        <div class="model-canvas-wrapper" id="container-4"></div>
        <div class="model-canvas-wrapper" id="container-5"></div>
    </div>
    <div id="detail-view">
        <div id="detail-canvas-container"></div>
        <div id="recipe-overlay"></div>
    </div>
    <div id="detail-label"></div>
    <div id="detail-question">RECIPE</div>
    <button id="back-button">BACK</button>
</body>
<script type="module">
    import * as THREE from "https://cdn.skypack.dev/three@0.129.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.skypack.dev/three@0.129.0/examples/jsm/loaders/GLTFLoader.js";
    import { DRACOLoader } from "https://cdn.skypack.dev/three@0.129.0/examples/jsm/loaders/DRACOLoader.js";
 
    const models = [
        './img/Marble_C.glb',
        './img/Multigrain_C.glb',
        './img/Pumpernickel_C.glb',
        './img/White_C.glb',
        './img/Pita_C.glb',
        './img/Rye_C.glb',
    ];
 
    const labels = [
        'MARBLE',
        'MULTIGRAIN',
        'PUMPERNICKEL',
        'WHITE',
        'PITA',
        'RYE',
    ];
 
    const headerLabels = [
        '01.  MARBLE',
        '02.  MULTIGRAIN',
        '03.  PUMPERNICKEL',
        '04.  WHITE',
        '05.  PITA',
        '06.  RYE',
    ];
 
    const recipes = {
        'MARBLE': {
            ingredients: ['2.25 TSP ACTIVE DRY YEAST', '1.5 CUPS WARM WATER', '3.5 CUPS BREAD FLOUR', '1.5 TSP SALT', '2 TBSP COCOA POWDER', '2 TBSP SUGAR'],
            method: 'DIVIDE DOUGH IN HALF. MIX COCOA INTO ONE HALF. PROOF BOTH SEPARATELY FOR 1 HOUR. LAYER AND TWIST TOGETHER, THEN SHAPE INTO A LOAF. PROOF 45 MIN. BAKE AT 375F FOR 35-40 MIN.',
        },
        'MULTIGRAIN': {
            ingredients: ['2.25 TSP YEAST', '1.25 CUPS WARM WATER', '2 CUPS BREAD FLOUR', '1 CUP WHOLE WHEAT FLOUR', '0.5 CUP ROLLED OATS', '2 TBSP SUNFLOWER SEEDS', '1 TSP SALT', '2 TBSP HONEY'],
            method: 'COMBINE FLOURS, OATS, AND SEEDS. DISSOLVE YEAST IN WATER WITH HONEY. MIX AND KNEAD 8 MIN. PROOF 1 HOUR, SHAPE, PROOF 45 MIN. BAKE AT 375F FOR 30-35 MIN.',
        },
        'PUMPERNICKEL': {
            ingredients: ['2.25 TSP YEAST', '1.25 CUPS WARM WATER', '1.5 CUPS RYE FLOUR', '1.5 CUPS BREAD FLOUR', '3 TBSP COCOA POWDER', '2 TBSP MOLASSES', '1 TSP CARAWAY SEEDS', '1.5 TSP SALT'],
            method: 'MIX FLOURS, COCOA, AND CARAWAY. COMBINE YEAST, WATER, AND MOLASSES. KNEAD 10 MIN — DOUGH WILL BE DENSE. PROOF 1.5 HOURS, SHAPE, PROOF 1 HOUR. BAKE AT 350F FOR 45 MIN.',
        },
        'WHITE': {
            ingredients: ['2.25 TSP ACTIVE DRY YEAST', '1.5 CUPS WARM WATER', '4 CUPS ALL-PURPOSE FLOUR', '1.5 TSP SALT', '1 TBSP SUGAR', '2 TBSP UNSALTED BUTTER'],
            method: 'PROOF YEAST IN WARM WATER WITH SUGAR. ADD FLOUR, SALT, AND SOFTENED BUTTER. KNEAD 8-10 MIN. PROOF 1 HOUR, PUNCH DOWN, SHAPE. PROOF 45 MIN. BAKE AT 375F FOR 30 MIN.',
        },
        'PITA': {
            ingredients: ['2.25 TSP YEAST', '1 CUP WARM WATER', '2.5 CUPS ALL-PURPOSE FLOUR', '1 TSP SALT', '1 TSP SUGAR', '2 TBSP OLIVE OIL'],
            method: 'MIX YEAST AND WATER WITH SUGAR. ADD FLOUR, SALT, AND OIL. KNEAD 6 MIN. PROOF 1 HOUR. DIVIDE INTO 8 BALLS, ROLL FLAT. REST 20 MIN. BAKE AT 500F FOR 4-5 MIN UNTIL PUFFED.',
        },
        'RYE': {
            ingredients: ['2.25 TSP YEAST', '1.25 CUPS WARM WATER', '2 CUPS RYE FLOUR', '1 CUP BREAD FLOUR', '1.5 TSP SALT', '1 TBSP CARAWAY SEEDS', '2 TBSP MOLASSES'],
            method: 'COMBINE FLOURS AND CARAWAY. DISSOLVE YEAST IN WATER WITH MOLASSES. KNEAD 8 MIN — DOUGH IS STICKY, RESIST ADDING FLOUR. PROOF 1.5 HOURS, SHAPE, PROOF 1 HOUR. BAKE AT 375F FOR 35 MIN.',
        },
    };
 
    const NUM = models.length;
    const CAM_DEFAULT = 3;
    const CAM_HOVER   = 2.6;
    const CAM_LERP    = 0.08;
    const DETAIL_DAMPING = 0.92;
 
    let orbitAngle = 0;
    let scrollVelocity = 0;
    const SCROLL_SENSITIVITY = 0.0008;
    const SCROLL_DAMPING = 0.92;
 
    const containers = [];
    const headerText = document.getElementById('header-text');
    const breadLabel = document.getElementById('bread-label');
    const detailView = document.getElementById('detail-view');
    const detailCanvasContainer = document.getElementById('detail-canvas-container');
    const detailLabel = document.getElementById('detail-label');
    const detailQuestion = document.getElementById('detail-question');
    const backButton = document.getElementById('back-button');
    const recipeOverlay = document.getElementById('recipe-overlay');
 
    let globalDragging = false;
    let draggedLabel = null;
    let inDetailView = false;
    let recipeOpen = false;
    let currentLabel = '';
 
    let detailScene, detailCamera, detailRenderer, detailModel, detailAnimId;
    let detailIsDragging = false;
    let detailPrevMouseX = 0;
    let detailPrevMouseY = 0;
    let detailVelX = 0;
    let detailVelY = 0;
 
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);
 
    function getRadius() {
        if (window.innerWidth <= 768) {
            return window.innerWidth * 0.35;
        }
        return window.innerWidth * 0.18;
    }
 
    function getContainerSize() {
        if (window.innerWidth <= 768) {
            return window.innerWidth * 0.35;
        }
        return window.innerWidth * 0.19;
    }
 
    function getCirclePositions(angle) {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const RADIUS = getRadius();
        return models.map((_, i) => {
            const a = angle + (i / NUM) * Math.PI * 2;
            return {
                x: cx + RADIUS * Math.cos(a),
                y: cy + RADIUS * Math.sin(a),
            };
        });
    }
 
    function updateContainerSizes() {
        const size = getContainerSize();
        document.querySelectorAll('.model-canvas-wrapper').forEach(el => {
            el.style.width  = size + 'px';
            el.style.height = size + 'px';
        });
    }
 
    function updateContainerPositions() {
        const positions = getCirclePositions(orbitAngle);
        containers.forEach((el, i) => {
            el.style.left = positions[i].x + 'px';
            el.style.top  = positions[i].y + 'px';
        });
    }
 
    function openRecipe(labelText) {
        const recipe = recipes[labelText];
        if (!recipe) return;
        recipeOpen = true;
        const ingredientLine = recipe.ingredients.join(',  ');
        const text = `${ingredientLine}.&nbsp;&nbsp;&nbsp;&nbsp;${recipe.method}`;
        recipeOverlay.innerHTML = `<p class="base-layer">${text}</p>`;
        recipeOverlay.classList.add('visible');
        detailQuestion.textContent = 'MODEL';
        detailCanvasContainer.style.pointerEvents = 'none';
        detailCanvasContainer.style.cursor = 'default';
    }
 
    function closeRecipe() {
        recipeOpen = false;
        recipeOverlay.classList.remove('visible');
        recipeOverlay.innerHTML = '';
        detailQuestion.textContent = 'RECIPE';
        detailCanvasContainer.style.pointerEvents = 'all';
        detailCanvasContainer.style.cursor = 'grab';
    }
 
    function openDetailView(modelPath, labelText, headerLabel) {
        inDetailView = true;
        currentLabel = labelText;
        detailView.classList.add('active');
        backButton.classList.add('active');
        detailQuestion.classList.add('active');
        detailQuestion.textContent = 'RECIPE';
        headerText.textContent = headerLabel;
        breadLabel.classList.remove('visible');
        recipeOpen = false;
        recipeOverlay.classList.remove('visible');
        recipeOverlay.innerHTML = '';
        detailCanvasContainer.style.pointerEvents = 'all';
        detailCanvasContainer.style.cursor = 'grab';
        detailVelY = 0;
 
        detailCanvasContainer.innerHTML = '';
 
        const w = detailCanvasContainer.clientWidth;
        const h = detailCanvasContainer.clientHeight;
 
        detailScene = new THREE.Scene();
        detailCamera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
        detailCamera.position.z = 3;
 
        detailRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        detailRenderer.setSize(w, h);
        detailRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        detailRenderer.outputColorSpace = THREE.SRGBColorSpace;
        detailRenderer.toneMapping = THREE.ACESFilmicToneMapping;
        detailRenderer.toneMappingExposure = 1.0;
        detailCanvasContainer.appendChild(detailRenderer.domElement);
 
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        detailScene.add(ambientLight);
        const light1 = new THREE.DirectionalLight(0xffffff, 0.6);
        light1.position.set(5, 5, 5);
        detailScene.add(light1);
        const light2 = new THREE.DirectionalLight(0xffffff, 0.6);
        light2.position.set(-5, 5, -5);
        detailScene.add(light2);
        const light3 = new THREE.DirectionalLight(0xffffff, 0.4);
        light3.position.set(0, -5, 0);
        detailScene.add(light3);
 
        loader.load(modelPath, (gltf) => {
            detailModel = gltf.scene;
 
            const box    = new THREE.Box3().setFromObject(detailModel);
            const center = box.getCenter(new THREE.Vector3());
            const size   = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale  = 1.5 / maxDim;
 
            detailModel.position.sub(center.multiplyScalar(scale));
            detailModel.scale.setScalar(scale);
            detailModel.rotation.x = Math.PI / 2;
 
            detailScene.add(detailModel);
        }, undefined, (err) => console.error(err));
 
        detailRenderer.domElement.addEventListener('mousedown', onDetailMouseDown);
        detailRenderer.domElement.addEventListener('touchstart', onDetailTouchStart, { passive: true });
 
        function animateDetail() {
            detailAnimId = requestAnimationFrame(animateDetail);
            if (!detailIsDragging && detailModel) {
                if (Math.abs(detailVelX) > 0.0001 || Math.abs(detailVelY) > 0.0001) {
                    detailModel.rotation.z -= detailVelX;
                    detailModel.rotation.x += detailVelY;
                    detailVelX *= DETAIL_DAMPING;
                    detailVelY *= DETAIL_DAMPING;
                }
            }
            detailRenderer.render(detailScene, detailCamera);
        }
        animateDetail();
    }
 
    function closeDetailView() {
        inDetailView = false;
        recipeOpen = false;
        currentLabel = '';
        detailView.classList.remove('active');
        backButton.classList.remove('active');
        detailQuestion.classList.remove('active');
        detailQuestion.textContent = 'RECIPE';
        recipeOverlay.classList.remove('visible');
        recipeOverlay.innerHTML = '';
        headerText.textContent = 'BREAD FOUNDRY';
        cancelAnimationFrame(detailAnimId);
        if (detailRenderer) {
            detailRenderer.dispose();
            detailCanvasContainer.innerHTML = '';
        }
        detailModel = null;
        detailVelX = 0;
        detailVelY = 0;
    }
 
    detailQuestion.addEventListener('click', () => {
        if (!inDetailView) return;
        if (recipeOpen) {
            closeRecipe();
        } else {
            openRecipe(currentLabel);
        }
    });
 
    function onDetailMouseDown(e) {
        if (recipeOpen) return;
        detailIsDragging = true;
        detailPrevMouseX = e.clientX;
        detailPrevMouseY = e.clientY;
        detailVelX = 0;
        detailVelY = 0;
 
        function onMove(e) {
            const dx = e.clientX - detailPrevMouseX;
            const dy = e.clientY - detailPrevMouseY;
            if (detailModel) {
                detailModel.rotation.z -= dx * 0.01;
                detailModel.rotation.x += dy * 0.01;
            }
            detailVelX = dx * 0.01;
            detailVelY = dy * 0.01;
            detailPrevMouseX = e.clientX;
            detailPrevMouseY = e.clientY;
        }
 
        function onUp() {
            detailIsDragging = false;
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
        }
 
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
    }
 
    function onDetailTouchStart(e) {
        if (recipeOpen) return;
        if (e.touches.length !== 1) return;
        detailIsDragging = true;
        detailPrevMouseX = e.touches[0].clientX;
        detailPrevMouseY = e.touches[0].clientY;
        detailVelX = 0;
        detailVelY = 0;
 
        function onMove(e) {
            if (e.touches.length !== 1) return;
            const dx = e.touches[0].clientX - detailPrevMouseX;
            const dy = e.touches[0].clientY - detailPrevMouseY;
            if (detailModel) {
                detailModel.rotation.z -= dx * 0.01;
                detailModel.rotation.x += dy * 0.01;
            }
            detailVelX = dx * 0.01;
            detailVelY = dy * 0.01;
            detailPrevMouseX = e.touches[0].clientX;
            detailPrevMouseY = e.touches[0].clientY;
        }
 
        function onEnd() {
            detailIsDragging = false;
            window.removeEventListener('touchmove', onMove);
            window.removeEventListener('touchend', onEnd);
        }
 
        window.addEventListener('touchmove', onMove, { passive: true });
        window.addEventListener('touchend', onEnd, { passive: true });
    }
 
    backButton.addEventListener('click', closeDetailView);
 
    window.addEventListener('wheel', (e) => {
        if (inDetailView) return;
        scrollVelocity += e.deltaY * SCROLL_SENSITIVITY;
    }, { passive: true });
 
    let lastTouchY = null;
    window.addEventListener('touchstart', (e) => {
        if (inDetailView) return;
        if (e.touches.length === 1) lastTouchY = e.touches[0].clientY;
    }, { passive: true });
 
    window.addEventListener('touchmove', (e) => {
        if (inDetailView) return;
        if (e.touches.length === 1 && lastTouchY !== null) {
            const delta = lastTouchY - e.touches[0].clientY;
            scrollVelocity += delta * SCROLL_SENSITIVITY;
            lastTouchY = e.touches[0].clientY;
        }
    }, { passive: true });
 
    window.addEventListener('touchend', () => {
        if (inDetailView) return;
        lastTouchY = null;
    }, { passive: true });
 
    function createViewer(containerId, modelPath, labelText, headerLabel) {
        return new Promise((resolve) => {
            const container = document.getElementById(containerId);
            containers.push(container);
 
            const width  = container.clientWidth;
            const height = container.clientHeight;
 
            const scene  = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.z = CAM_DEFAULT;
 
            let camTarget = CAM_DEFAULT;
 
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);
 
            const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
            scene.add(ambientLight);
            const light1 = new THREE.DirectionalLight(0xffffff, 0.6);
            light1.position.set(5, 5, 5);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xffffff, 0.6);
            light2.position.set(-5, 5, -5);
            scene.add(light2);
            const light3 = new THREE.DirectionalLight(0xffffff, 0.4);
            light3.position.set(0, -5, 0);
            scene.add(light3);
 
            let model = null;
            let isDragging = false;
            let mouseDownX = 0;
            let mouseDownY = 0;
            let prevMouseX = 0;
            let dragVelocity = 0;
            let autoSpin = true;
 
            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = false;
                globalDragging = true;
                draggedLabel = labelText;
                mouseDownX = e.clientX;
                mouseDownY = e.clientY;
                prevMouseX = e.clientX;
                dragVelocity = 0;
                autoSpin = false;
                container.style.cursor = 'grabbing';
                breadLabel.textContent = labelText;
                breadLabel.classList.add('visible');
            });
 
            window.addEventListener('mousemove', (e) => {
                if (!globalDragging || draggedLabel !== labelText || !model) return;
                const dx = e.clientX - mouseDownX;
                const dy = e.clientY - mouseDownY;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
                const delta = e.clientX - prevMouseX;
                model.rotation.z -= delta * 0.01;
                dragVelocity = delta * 0.01;
                prevMouseX = e.clientX;
            });
 
            window.addEventListener('mouseup', (e) => {
                if (!globalDragging || draggedLabel !== labelText) return;
                globalDragging = false;
                draggedLabel = null;
                container.style.cursor = 'grab';
                setTimeout(() => { autoSpin = true; }, 800);
 
                if (!isDragging) {
                    openDetailView(modelPath, labelText, headerLabel);
                } else {
                    breadLabel.classList.remove('visible');
                }
                isDragging = false;
            });
 
            renderer.domElement.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = false;
                    globalDragging = true;
                    draggedLabel = labelText;
                    mouseDownX = e.touches[0].clientX;
                    mouseDownY = e.touches[0].clientY;
                    prevMouseX = e.touches[0].clientX;
                    dragVelocity = 0;
                    autoSpin = false;
                    breadLabel.textContent = labelText;
                    breadLabel.classList.add('visible');
                }
            });
 
            window.addEventListener('touchmove', (e) => {
                if (!globalDragging || draggedLabel !== labelText || !model) return;
                const dx = e.touches[0].clientX - mouseDownX;
                const dy = e.touches[0].clientY - mouseDownY;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
                const delta = e.touches[0].clientX - prevMouseX;
                model.rotation.z -= delta * 0.01;
                dragVelocity = delta * 0.01;
                prevMouseX = e.touches[0].clientX;
            });
 
            window.addEventListener('touchend', () => {
                if (!globalDragging || draggedLabel !== labelText) return;
                globalDragging = false;
                draggedLabel = null;
                setTimeout(() => { autoSpin = true; }, 800);
 
                if (!isDragging) {
                    openDetailView(modelPath, labelText, headerLabel);
                } else {
                    breadLabel.classList.remove('visible');
                }
                isDragging = false;
            });
 
            container.addEventListener('mouseenter', () => {
                camTarget = CAM_HOVER;
                container.style.cursor = 'grab';
                if (!globalDragging) {
                    breadLabel.textContent = labelText;
                    breadLabel.classList.add('visible');
                }
            });
 
            container.addEventListener('mouseleave', () => {
                camTarget = CAM_DEFAULT;
                container.style.cursor = 'default';
                if (!globalDragging) {
                    breadLabel.classList.remove('visible');
                }
            });
 
            loader.load(
                modelPath,
                function (gltf) {
                    model = gltf.scene;
 
                    const box    = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size   = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale  = 1.5 / maxDim;
 
                    model.position.sub(center.multiplyScalar(scale));
                    model.scale.setScalar(scale);
                    model.rotation.x = Math.PI / 2;
 
                    scene.add(model);
                    resolve();
                },
                undefined,
                (error) => {
                    console.error('Error loading ' + modelPath, error);
                    resolve();
                }
            );
 
            window.addEventListener("resize", () => {
                const w = container.clientWidth;
                const h = container.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });
 
            function animate() {
                requestAnimationFrame(animate);
                camera.position.z += (camTarget - camera.position.z) * CAM_LERP;
                if (model) {
                    if (autoSpin) {
                        model.rotation.z += 0.008;
                        dragVelocity = 0;
                    } else if (!globalDragging && Math.abs(dragVelocity) > 0.0001) {
                        model.rotation.z -= dragVelocity;
                        dragVelocity *= 0.92;
                    }
                }
                renderer.render(scene, camera);
            }
            animate();
        });
    }
 
    async function loadSequential() {
        updateContainerSizes();
        updateContainerPositions();
        for (let i = 0; i < models.length; i++) {
            await createViewer(`container-${i}`, models[i], labels[i], headerLabels[i]);
        }
    }
 
    loadSequential();
 
    function orbitLoop() {
        requestAnimationFrame(orbitLoop);
        if (!inDetailView) {
            orbitAngle += scrollVelocity;
            scrollVelocity *= SCROLL_DAMPING;
            if (Math.abs(scrollVelocity) < 0.00001) scrollVelocity = 0;
            updateContainerPositions();
        }
    }
    orbitLoop();
 
    window.addEventListener('resize', () => {
        updateContainerSizes();
        updateContainerPositions();
    });
</script>
</html>
