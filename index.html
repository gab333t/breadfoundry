<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BREAD FOUNDRY</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
</head>
<body>
    <p>BREAD FOUNDRY</p>
    <div id="bread-label"></div>
    <div id="models-container">
        <div class="model-canvas-wrapper" id="container-0"></div>
        <div class="model-canvas-wrapper" id="container-1"></div>
        <div class="model-canvas-wrapper" id="container-2"></div>
        <div class="model-canvas-wrapper" id="container-3"></div>
        <div class="model-canvas-wrapper" id="container-4"></div>
        <div class="model-canvas-wrapper" id="container-5"></div>
    </div>
    <div id="detail-view">
        <div id="detail-canvas-container"></div>
    </div>
    <div id="detail-label"></div>
    <button id="back-button">BACK</button>
</body>
<script type="module">
    import * as THREE from "https://cdn.skypack.dev/three@0.129.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.skypack.dev/three@0.129.0/examples/jsm/loaders/GLTFLoader.js";
    import { DRACOLoader } from "https://cdn.skypack.dev/three@0.129.0/examples/jsm/loaders/DRACOLoader.js";

    const models = [
        './img/Marble_C.glb',
        './img/Multigrain_C.glb',
        './img/Pumpernickel_C.glb',
        './img/White_C.glb',
        './img/Pita_C.glb',
        './img/Rye_C.glb',
    ];

    const labels = [
        'MARBLE',
        'MULTIGRAIN',
        'PUMPERNICKEL',
        'WHITE',
        'PITA',
        'RYE',
    ];

    const NUM = models.length;
    const CAM_DEFAULT = 3;
    const CAM_HOVER   = 2.6;
    const CAM_LERP    = 0.08;
    const DETAIL_DAMPING = 0.92;

    let orbitAngle = 0;
    let scrollVelocity = 0;
    const SCROLL_SENSITIVITY = 0.0008;
    const SCROLL_DAMPING = 0.92;

    const containers = [];
    const breadLabel = document.getElementById('bread-label');
    const detailView = document.getElementById('detail-view');
    const detailCanvasContainer = document.getElementById('detail-canvas-container');
    const detailLabel = document.getElementById('detail-label');
    const backButton = document.getElementById('back-button');

    let globalDragging = false;
    let draggedLabel = null;
    let inDetailView = false;

    let detailScene, detailCamera, detailRenderer, detailModel, detailAnimId;
    let detailIsDragging = false;
    let detailPrevMouseX = 0;
    let detailPrevMouseY = 0;
    let detailVelX = 0;
    let detailVelY = 0;

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    function getRadius() {
        return window.innerWidth * 0.18;
    }

    function getContainerSize() {
        return window.innerWidth * 0.19;
    }

    function getCirclePositions(angle) {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const RADIUS = getRadius();
        return models.map((_, i) => {
            const a = angle + (i / NUM) * Math.PI * 2;
            return {
                x: cx + RADIUS * Math.cos(a),
                y: cy + RADIUS * Math.sin(a),
            };
        });
    }

    function updateContainerSizes() {
        const size = getContainerSize();
        document.querySelectorAll('.model-canvas-wrapper').forEach(el => {
            el.style.width  = size + 'px';
            el.style.height = size + 'px';
        });
    }

    function updateContainerPositions() {
        const positions = getCirclePositions(orbitAngle);
        containers.forEach((el, i) => {
            el.style.left = positions[i].x + 'px';
            el.style.top  = positions[i].y + 'px';
        });
    }

    function openDetailView(modelPath, labelText) {
        inDetailView = true;
        detailView.classList.add('active');
        backButton.classList.add('active');
        detailLabel.textContent = labelText;
        detailLabel.classList.add('active');
        breadLabel.classList.remove('visible');

        detailVelX = 0;
        detailVelY = 0;

        detailCanvasContainer.innerHTML = '';

        const w = detailCanvasContainer.clientWidth;
        const h = detailCanvasContainer.clientHeight;

        detailScene = new THREE.Scene();
        detailCamera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
        detailCamera.position.z = 3;

        detailRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        detailRenderer.setSize(w, h);
        detailRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        detailRenderer.outputColorSpace = THREE.SRGBColorSpace;
        detailRenderer.toneMapping = THREE.ACESFilmicToneMapping;
        detailRenderer.toneMappingExposure = 1.0;
        detailCanvasContainer.appendChild(detailRenderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        detailScene.add(ambientLight);
        const light1 = new THREE.DirectionalLight(0xffffff, 0.6);
        light1.position.set(5, 5, 5);
        detailScene.add(light1);
        const light2 = new THREE.DirectionalLight(0xffffff, 0.6);
        light2.position.set(-5, 5, -5);
        detailScene.add(light2);
        const light3 = new THREE.DirectionalLight(0xffffff, 0.4);
        light3.position.set(0, -5, 0);
        detailScene.add(light3);

        loader.load(modelPath, (gltf) => {
            detailModel = gltf.scene;

            const box    = new THREE.Box3().setFromObject(detailModel);
            const center = box.getCenter(new THREE.Vector3());
            const size   = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale  = 1.5 / maxDim;

            detailModel.position.sub(center.multiplyScalar(scale));
            detailModel.scale.setScalar(scale);
            detailModel.rotation.x = Math.PI / 2;

            detailScene.add(detailModel);
        }, undefined, (err) => console.error(err));

        detailRenderer.domElement.addEventListener('mousedown', onDetailMouseDown);
        detailRenderer.domElement.addEventListener('touchstart', onDetailTouchStart, { passive: true });

        function animateDetail() {
            detailAnimId = requestAnimationFrame(animateDetail);
            if (!detailIsDragging && detailModel) {
                if (Math.abs(detailVelX) > 0.0001 || Math.abs(detailVelY) > 0.0001) {
                    detailModel.rotation.z -= detailVelX;
                    detailModel.rotation.x += detailVelY;
                    detailVelX *= DETAIL_DAMPING;
                    detailVelY *= DETAIL_DAMPING;
                }
            }
            detailRenderer.render(detailScene, detailCamera);
        }
        animateDetail();
    }

    function closeDetailView() {
        inDetailView = false;
        detailView.classList.remove('active');
        backButton.classList.remove('active');
        detailLabel.classList.remove('active');
        cancelAnimationFrame(detailAnimId);
        if (detailRenderer) {
            detailRenderer.dispose();
            detailCanvasContainer.innerHTML = '';
        }
        detailModel = null;
        detailVelX = 0;
        detailVelY = 0;
    }

    function onDetailMouseDown(e) {
        detailIsDragging = true;
        detailPrevMouseX = e.clientX;
        detailPrevMouseY = e.clientY;
        detailVelX = 0;
        detailVelY = 0;

        function onMove(e) {
            const dx = e.clientX - detailPrevMouseX;
            const dy = e.clientY - detailPrevMouseY;
            if (detailModel) {
                detailModel.rotation.z -= dx * 0.01;
                detailModel.rotation.x += dy * 0.01;
            }
            detailVelX = dx * 0.01;
            detailVelY = dy * 0.01;
            detailPrevMouseX = e.clientX;
            detailPrevMouseY = e.clientY;
        }

        function onUp() {
            detailIsDragging = false;
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
        }

        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
    }

    function onDetailTouchStart(e) {
        if (e.touches.length !== 1) return;
        detailIsDragging = true;
        detailPrevMouseX = e.touches[0].clientX;
        detailPrevMouseY = e.touches[0].clientY;
        detailVelX = 0;
        detailVelY = 0;

        function onMove(e) {
            if (e.touches.length !== 1) return;
            const dx = e.touches[0].clientX - detailPrevMouseX;
            const dy = e.touches[0].clientY - detailPrevMouseY;
            if (detailModel) {
                detailModel.rotation.z -= dx * 0.01;
                detailModel.rotation.x += dy * 0.01;
            }
            detailVelX = dx * 0.01;
            detailVelY = dy * 0.01;
            detailPrevMouseX = e.touches[0].clientX;
            detailPrevMouseY = e.touches[0].clientY;
        }

        function onEnd() {
            detailIsDragging = false;
            window.removeEventListener('touchmove', onMove);
            window.removeEventListener('touchend', onEnd);
        }

        window.addEventListener('touchmove', onMove, { passive: true });
        window.addEventListener('touchend', onEnd, { passive: true });
    }

    backButton.addEventListener('click', closeDetailView);

    window.addEventListener('wheel', (e) => {
        if (inDetailView) return;
        scrollVelocity += e.deltaY * SCROLL_SENSITIVITY;
    }, { passive: true });

    let lastTouchY = null;
    window.addEventListener('touchstart', (e) => {
        if (inDetailView) return;
        if (e.touches.length === 1) lastTouchY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
        if (inDetailView) return;
        if (e.touches.length === 1 && lastTouchY !== null) {
            const delta = lastTouchY - e.touches[0].clientY;
            scrollVelocity += delta * SCROLL_SENSITIVITY;
            lastTouchY = e.touches[0].clientY;
        }
    }, { passive: true });

    window.addEventListener('touchend', () => {
        if (inDetailView) return;
        lastTouchY = null;
    }, { passive: true });

    function createViewer(containerId, modelPath, labelText) {
        return new Promise((resolve) => {
            const container = document.getElementById(containerId);
            containers.push(container);

            const width  = container.clientWidth;
            const height = container.clientHeight;

            const scene  = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.z = CAM_DEFAULT;

            let camTarget = CAM_DEFAULT;

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
            scene.add(ambientLight);
            const light1 = new THREE.DirectionalLight(0xffffff, 0.6);
            light1.position.set(5, 5, 5);
            scene.add(light1);
            const light2 = new THREE.DirectionalLight(0xffffff, 0.6);
            light2.position.set(-5, 5, -5);
            scene.add(light2);
            const light3 = new THREE.DirectionalLight(0xffffff, 0.4);
            light3.position.set(0, -5, 0);
            scene.add(light3);

            let model = null;
            let isDragging = false;
            let mouseDownX = 0;
            let mouseDownY = 0;
            let prevMouseX = 0;
            let dragVelocity = 0;
            let autoSpin = true;

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = false;
                globalDragging = true;
                draggedLabel = labelText;
                mouseDownX = e.clientX;
                mouseDownY = e.clientY;
                prevMouseX = e.clientX;
                dragVelocity = 0;
                autoSpin = false;
                container.style.cursor = 'grabbing';
                breadLabel.textContent = labelText;
                breadLabel.classList.add('visible');
            });

            window.addEventListener('mousemove', (e) => {
                if (!globalDragging || draggedLabel !== labelText || !model) return;
                const dx = e.clientX - mouseDownX;
                const dy = e.clientY - mouseDownY;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
                const delta = e.clientX - prevMouseX;
                model.rotation.z -= delta * 0.01;
                dragVelocity = delta * 0.01;
                prevMouseX = e.clientX;
            });

            window.addEventListener('mouseup', (e) => {
                if (!globalDragging || draggedLabel !== labelText) return;
                globalDragging = false;
                draggedLabel = null;
                container.style.cursor = 'grab';
                setTimeout(() => { autoSpin = true; }, 800);

                if (!isDragging) {
                    openDetailView(modelPath, labelText);
                } else {
                    breadLabel.classList.remove('visible');
                }
                isDragging = false;
            });

            renderer.domElement.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = false;
                    globalDragging = true;
                    draggedLabel = labelText;
                    mouseDownX = e.touches[0].clientX;
                    mouseDownY = e.touches[0].clientY;
                    prevMouseX = e.touches[0].clientX;
                    dragVelocity = 0;
                    autoSpin = false;
                    breadLabel.textContent = labelText;
                    breadLabel.classList.add('visible');
                }
            });

            window.addEventListener('touchmove', (e) => {
                if (!globalDragging || draggedLabel !== labelText || !model) return;
                const dx = e.touches[0].clientX - mouseDownX;
                const dy = e.touches[0].clientY - mouseDownY;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
                const delta = e.touches[0].clientX - prevMouseX;
                model.rotation.z -= delta * 0.01;
                dragVelocity = delta * 0.01;
                prevMouseX = e.touches[0].clientX;
            });

            window.addEventListener('touchend', () => {
                if (!globalDragging || draggedLabel !== labelText) return;
                globalDragging = false;
                draggedLabel = null;
                setTimeout(() => { autoSpin = true; }, 800);

                if (!isDragging) {
                    openDetailView(modelPath, labelText);
                } else {
                    breadLabel.classList.remove('visible');
                }
                isDragging = false;
            });

            container.addEventListener('mouseenter', () => {
                camTarget = CAM_HOVER;
                container.style.cursor = 'grab';
                if (!globalDragging) {
                    breadLabel.textContent = labelText;
                    breadLabel.classList.add('visible');
                }
            });

            container.addEventListener('mouseleave', () => {
                camTarget = CAM_DEFAULT;
                container.style.cursor = 'default';
                if (!globalDragging) {
                    breadLabel.classList.remove('visible');
                }
            });

            loader.load(
                modelPath,
                function (gltf) {
                    model = gltf.scene;

                    const box    = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size   = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale  = 1.5 / maxDim;

                    model.position.sub(center.multiplyScalar(scale));
                    model.scale.setScalar(scale);
                    model.rotation.x = Math.PI / 2;

                    scene.add(model);
                    resolve();
                },
                undefined,
                (error) => {
                    console.error('Error loading ' + modelPath, error);
                    resolve();
                }
            );

            window.addEventListener("resize", () => {
                const w = container.clientWidth;
                const h = container.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            function animate() {
                requestAnimationFrame(animate);
                camera.position.z += (camTarget - camera.position.z) * CAM_LERP;
                if (model) {
                    if (autoSpin) {
                        model.rotation.z += 0.008;
                        dragVelocity = 0;
                    } else if (!globalDragging && Math.abs(dragVelocity) > 0.0001) {
                        model.rotation.z -= dragVelocity;
                        dragVelocity *= 0.92;
                    }
                }
                renderer.render(scene, camera);
            }
            animate();
        });
    }

    async function loadSequential() {
        updateContainerSizes();
        updateContainerPositions();
        for (let i = 0; i < models.length; i++) {
            await createViewer(`container-${i}`, models[i], labels[i]);
        }
    }

    loadSequential();

    function orbitLoop() {
        requestAnimationFrame(orbitLoop);
        if (!inDetailView) {
            orbitAngle += scrollVelocity;
            scrollVelocity *= SCROLL_DAMPING;
            if (Math.abs(scrollVelocity) < 0.00001) scrollVelocity = 0;
            updateContainerPositions();
        }
    }
    orbitLoop();

    window.addEventListener('resize', () => {
        updateContainerSizes();
        updateContainerPositions();
    });
</script>
</html>
